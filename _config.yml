#------------------------------------------------------------------------------
# General
#------------------------------------------------------------------------------
name: "MikeDopp"
description: "Fancy Pants"
language: "en"

url: https://mikedopp.github.io
baseurl: ''

#------------------------------------------------------------------------------
# Markdown processor and code highlighting
#------------------------------------------------------------------------------
markdown: kramdown
markdown_ext: "markdown,mkdown,mkdn,mkd,md"
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge

#------------------------------------------------------------------------------
# Pagination and friendly URLs
#------------------------------------------------------------------------------
paginate: 5
#paginate_path: /page-:num
permalink: /:categories/:year/:month/:day/:title/
#github_repo_url: https://github.com/mikedopp/mikedopp.github.io/
#------------------------------------------------------------------------------
# Social sharing, comments and RSS.
#------------------------------------------------------------------------------
disqus-id: mike_dopp
enable-share: true
twitter: mikedopp
#github: mikedopp
google: +mikedopp
facebook: mikedopp


rss-feed-limit: 5
rss-show-full: "no"

#------------------------------------------------------------------------------
# Configuration, plugins, gems, etc..
#------------------------------------------------------------------------------
source: .
destination: ./_site
gems: ['jekyll-paginate']

sass:
    style: :compressed
    sass_dir: assets/css/
theme: jekyll-theme-hacker